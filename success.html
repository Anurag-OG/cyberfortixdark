<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
<style>

body{
    background:#0b0b0f;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.success-box{
    background:#121218;
    border:1px solid #2a2a35;
    padding:40px 50px;
    border-radius:12px;
    text-align:center;
    max-width:420px;
    box-shadow:0 0 40px rgba(124,58,237,0.2);
}

.success-icon{
    font-size:50px;
    color:#7c3aed;
    margin-bottom:15px;
}

.success-title{
    font-size:22px;
    color:white;
    font-weight:bold;
    margin-bottom:10px;
}

.success-text{
    color:#b3b3c6;
    font-size:15px;
    line-height:1.6;
}

.home-btn{
    margin-top:25px;
    display:inline-block;
    padding:12px 25px;
    background:#7c3aed;
    color:white;
    text-decoration:none;
    border-radius:6px;
    font-size:14px;
    transition:0.3s;
}

.home-btn:hover{
    background:#6d28d9;
}

</style>
</head>

<body>

<div class="success-box">

<div class="success-icon">✔</div>

<div class="success-title">
Success!
</div>

<div class="success-text">
Your message has been sent successfully.<br>
Our team will respond within <b>1–2 business days.</b>
</div>

<a href="index.html" class="home-btn">
Return to Home
</a>

</div>

</body>

</html>
